version: '3.8'
services:
  db:
    image: postgres:latest
    container_name: nest-postgres
    ports:
      - '5432:5432' # [호스트 포트]:[컨테이너 내부 포트]
    environment:
      POSTGRES_USER: choonsik
      POSTGRES_PASSWORD: 2400
      POSTGRES_DB: diary_database
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
